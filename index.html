<script type="importmap">

    "react/": "https://esm.sh/react@^19.2.4/",

<body>
    <canvas id="starfield"></canvas>
    <div id="root"></div>
    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let numStars = 600;
        let speed = 4;
        let targetSpeed = 4;
        let centerX, centerY;
        let focalLength;

        window.setStarSpeed = (newSpeed) => { targetSpeed = newSpeed; };

        function initStars() {
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
            focalLength = canvas.width;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width - centerX,
                    y: Math.random() * canvas.height - centerY,
                    z: Math.random() * canvas.width,
                    color: ['#ffffff', '#67e8f9', '#fef08a', '#d8b4fe'][Math.floor(Math.random() * 4)],
                    px: 0, py: 0
                });
            }
        }

        function draw() {
            speed += (targetSpeed - speed) * 0.1;
            const isLight = document.body.classList.contains('theme-light');
            if (!isLight) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                let oldX = (s.x / s.z) * focalLength + centerX;
                let oldY = (s.y / s.z) * focalLength + centerY;
                s.z -= speed;
                if (s.z <= 0) {
                    s.z = canvas.width;
                    s.x = Math.random() * canvas.width - centerX;
                    s.y = Math.random() * canvas.height - centerY;
                    oldX = (s.x / s.z) * focalLength + centerX;
                    oldY = (s.y / s.z) * focalLength + centerY;
                }
                let x = (s.x / s.z) * focalLength + centerX;
                let y = (s.y / s.z) * focalLength + centerY;
                let opacity = 1 - (s.z / canvas.width);
                ctx.beginPath();
                ctx.moveTo(oldX, oldY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = isLight ? '#000000' : s.color;
                ctx.lineWidth = (1 - s.z / canvas.width) * (speed > 10 ? 4 : 2);
                ctx.globalAlpha = isLight ? opacity * 0.1 : opacity;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
<script type="module" src="index.tsx"></script>
